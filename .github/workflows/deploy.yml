name: deploy-orders-api

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RG: rg-orders-demo
  LOCATION: westeurope
  APP_NAME: orders-api
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group and Azure providers exist
        run: |
          az group create --name "$RG" --location "$LOCATION"
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait

      - name: Deploy foundation infrastructure
        run: |
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/foundation.bicep \
            --parameters location="$LOCATION" appName="$APP_NAME" acrName="$ACR_NAME"

      - name: Enable ARM audience tokens for ACR managed-identity pulls
        run: |
          az acr config authentication-as-arm update \
            --registry "$ACR_NAME" \
            --status enabled

      - name: Build and push Docker image tagged with commit SHA
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="$ACR_NAME.azurecr.io/$APP_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Container App revision
        run: |
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/app.bicep \
            --parameters location="$LOCATION" appName="$APP_NAME" acrName="$ACR_NAME" imageTag="${{ github.sha }}"

      - name: Smoke test release
        run: |
          FQDN=$(az containerapp show \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "Testing https://$FQDN/health"
          curl -fsS "https://$FQDN/health"

      - name: Show active revisions
        run: |
          az containerapp revision list \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --output table
