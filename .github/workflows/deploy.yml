name: deploy-orders-api

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RG: rg-orders-demo-ne
  LOCATION: northeurope
  APP_NAME: orders-api
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show deployment context
        run: |
          echo "Resource group: $RG"
          echo "Location: $LOCATION"
          echo "App name: $APP_NAME"
          echo "ACR name: $ACR_NAME"

      - name: Build and push Docker image
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="$ACR_NAME.azurecr.io/$APP_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Container App revision
        run: |
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/app.bicep \
            --parameters location="$LOCATION" appName="$APP_NAME" acrName="$ACR_NAME" imageTag="${{ github.sha }}"

      - name: Smoke test health endpoint
        run: |
          FQDN=$(az containerapp show \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "App URL: https://$FQDN"
          curl -fsS "https://$FQDN/health"

      - name: Show active revisions
        run: |
          az containerapp revision list \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --output table
